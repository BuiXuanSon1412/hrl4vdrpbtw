# configs/base.yaml
# ─────────────────────────────────────────────────────────────────────────────
# Base configuration — all other configs inherit from this.
# Override specific keys by creating a derived config (see configs/experiments/).
# ─────────────────────────────────────────────────────────────────────────────

defaults:
  - _self_

# ── Experiment identity ───────────────────────────────────────────────────────
experiment:
  name: "vrpbtw_baseline"
  seed: 42
  tags: []                       # arbitrary tags for W&B / TensorBoard grouping
  notes: ""

# ── Problem definition ────────────────────────────────────────────────────────
problem:
  num_customers: 100
  num_vehicles: 7
  num_drones: 7
  vehicle_capacity: 100.0
  drone_capacity: 10.0
  drone_battery: 100.0
  map_size: 100.0
  # Customer mix
  linehaul_ratio: 0.5            # fraction of customers that are linehaul
  # Time window generation (Solomon style)
  time_horizon: 200.0
  time_window_width_min: 30.0
  time_window_width_max: 80.0

# ── Environment ───────────────────────────────────────────────────────────────
env:
  normalize_rewards: true
  cost_weight: 0.5
  tardiness_weight: 0.5
  invalid_action_penalty: 100.0
  unserved_customer_penalty: 200.0
  max_steps_multiplier: 2        # episode terminates after num_customers * multiplier steps

# ── Model (architecture stub — details live in src/models/) ──────────────────
model:
  type: "hierarchical"           # hierarchical | end2end
  embedding_dim: 128
  num_encoder_layers: 3
  num_heads: 8
  qkv_dim: 16
  ff_hidden_dim: 512
  logit_clipping: 10.0
  dropout: 0.0

# ── Agent / algorithm ─────────────────────────────────────────────────────────
agent:
  type: "reinforce"              # reinforce | ppo | a2c
  high_level_lr: 3.0e-4
  low_level_lr: 3.0e-4
  gamma: 0.99
  entropy_coef: 0.01
  # Exploration
  epsilon_start: 1.0
  epsilon_end: 0.05
  epsilon_decay: 0.995
  temperature_start: 2.0
  temperature_end: 0.5
  temperature_decay: 0.995

# ── Training ──────────────────────────────────────────────────────────────────
training:
  num_episodes: 1000
  batch_size: 32
  train_every_n_episodes: 5      # accumulate experience, then train
  grad_clip: 1.0
  value_loss_coef: 0.5
  # Curriculum (gradually increase problem size if enabled)
  curriculum:
    enabled: false
    start_customers: 20
    increment_every: 200         # episodes
    increment_by: 10

# ── Evaluation ────────────────────────────────────────────────────────────────
evaluation:
  eval_every_n_episodes: 50
  num_eval_episodes: 20
  save_best_checkpoint: true
  metrics:                       # which metrics to track for "best model" decision
    primary: "service_rate"      # higher is better
    secondary: "mean_cost"       # lower is better

# ── Checkpointing ─────────────────────────────────────────────────────────────
checkpoint:
  dir: "outputs/checkpoints"
  save_every_n_episodes: 100
  keep_last_n: 5                 # rotate old checkpoints

# ── Logging ───────────────────────────────────────────────────────────────────
logging:
  backend: "tensorboard"         # tensorboard | wandb | both | none
  log_dir: "outputs/logs"
  wandb_project: "vrpbtw-rl"
  log_every_n_episodes: 10

# ── Data ──────────────────────────────────────────────────────────────────────
data:
  generated_dir: "data/generated"
  processed_dir: "data/processed"
  # Instance sizes for multi-size training / benchmarks
  benchmark_sizes: [20, 50, 100, 150, 200]
