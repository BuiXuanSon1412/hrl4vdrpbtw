# configs/experiments/small_debug.yaml
# Quick smoke-test — runs in seconds
defaults:
  - base
  - _self_

experiment:
  name: "debug_small"

problem:
  num_customers: 20
  num_vehicles: 3
  num_drones: 2

training:
  num_episodes: 50
  batch_size: 8

evaluation:
  eval_every_n_episodes: 10
  num_eval_episodes: 5

logging:
  backend: "none"
