# configs/tuning/optuna_search.yaml
# Search space for Optuna HPO — used by scripts/tune.py
defaults:
  - base
  - _self_

tuning:
  framework: "optuna"
  study_name: "vrpbtw_hpo"
  n_trials: 100
  n_jobs: 4                     # parallel Optuna workers
  direction: "maximize"         # maximize primary metric
  sampler: "tpe"                # tpe | cmaes | random
  pruner: "median"              # median | hyperband | none
  # Metric reported to Optuna at each eval checkpoint
  objective_metric: "eval/service_rate"

  search_space:
    agent.high_level_lr:
      type: float
      low: 1.0e-5
      high: 1.0e-3
      log: true
    agent.low_level_lr:
      type: float
      low: 1.0e-5
      high: 1.0e-3
      log: true
    agent.entropy_coef:
      type: float
      low: 0.001
      high: 0.1
      log: true
    model.embedding_dim:
      type: categorical
      choices: [64, 128, 256]
    model.num_encoder_layers:
      type: int
      low: 1
      high: 6
    model.num_heads:
      type: categorical
      choices: [4, 8, 16]
    training.batch_size:
      type: categorical
      choices: [16, 32, 64, 128]
    agent.gamma:
      type: float
      low: 0.90
      high: 0.999
    env.cost_weight:
      type: float
      low: 0.1
      high: 0.9

  # Short training budget per trial (full training done on the best found config)
  trial_budget:
    num_episodes: 300
    eval_every_n_episodes: 50
    num_eval_episodes: 10
