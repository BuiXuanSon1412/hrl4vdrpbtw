# configs/experiments/large_scale.yaml
defaults:
  - base
  - _self_

experiment:
  name: "large_scale_100c"
  tags: ["large", "production"]

problem:
  num_customers: 100
  num_vehicles: 7
  num_drones: 7

model:
  embedding_dim: 256
  num_encoder_layers: 6
  num_heads: 8
  ff_hidden_dim: 1024

training:
  num_episodes: 3000
  batch_size: 64

evaluation:
  eval_every_n_episodes: 100
  num_eval_episodes: 50

logging:
  backend: "wandb"
