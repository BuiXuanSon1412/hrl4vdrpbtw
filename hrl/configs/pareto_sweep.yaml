# configs/experiments/pareto_sweep.yaml
# Train a family of agents across the cost-tardiness Pareto front
defaults:
  - base
  - _self_

experiment:
  name: "pareto_sweep"
  tags: ["pareto", "multi-objective"]

training:
  num_episodes: 500

# The actual weight grid is defined in scripts/tune.py using Optuna / a manual grid.
# This config just locks the shared hyperparameters.
env:
  cost_weight: 0.5          # placeholder — overridden per sweep trial
  tardiness_weight: 0.5
