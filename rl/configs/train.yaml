# train.yaml
# Default training composition: Vanilla PPO baseline
#
# For other training modes, use:
#   train_base.yaml   - Vanilla PPO
#   train_pomo.yaml   - POMO with multiple starts
#   train_meta.yaml   - MAML with curriculum learning

device: cpu

reproducibility:
  seed:
    global_seed: 42
    torch_seed: 42
    numpy_seed: 42

experiment: train

_include:
  - trainer: trainer/pomo.yaml
  - policy: policy/hgnn.yaml
  - environment: environment/vrpbtw.yaml
  - estimator: estimator/reinforce.yaml
