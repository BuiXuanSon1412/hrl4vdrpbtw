# =============================================================================
# configs/train/vrpbtw_meta.yaml — Meta-Learning with MAML
# =============================================================================
# Meta-learning configuration for training a policy across multiple task sizes
# using Model-Agnostic Meta-Learning (MAML).
#
# Algorithm: MAML (second-order) with curriculum learning
# Training: Support/Query collection → Inner-loop adaptation → Outer meta-gradient
#
# Workflow:
#   1. Sample task from curriculum-managed task pool
#   2. Collect support data on that task
#   3. Inner loop: adapt meta-policy to task via gradient descent
#   4. Collect query data on adapted policy
#   5. Outer loop: compute meta-gradient from query loss
#   6. Meta-update: update meta-policy
#   7. Repeat until budget exhausted or early stopping
#
# =============================================================================

# =============================================================================
# Experiment Metadata & Reproducibility
# =============================================================================
name: vrpbtw_meta

experiment:
  name: vrpbtw_meta
  description: >
    Multi-task meta-learning on VRPBTW with curriculum expansion.
    Tasks: 10, 20, 50, 100 nodes. Starts at size 10, expands when policy
    converges. Uses second-order MAML with entropy-based curriculum.
  tags: [meta-learning, maml, curriculum, vrpbtw, multi-task]

reproducibility:
  seed:
    global_seed: 42             # Master seed (init everything)
    env_seed: null              # null → derived from global
    data_seed: null             # null → derived from global
  device: cpu                   # cpu | cuda

# =============================================================================
# Environment & Problem Configuration
# =============================================================================
environment:
  problem:
    name: vrpbtw                # Vehicle Routing with Backhauls & Time Windows
    kwargs:
      linehaul_ratio: 0.5       # Fraction linehaul vs. backhaul
      generator_seed_offset: 100000
      lambda_weight: 1.0
  reward:
    scale: 1.0                  # Reward scaling
    max_episode_length: null    # null = no limit

  # Multi-task: sizes defined in algorithm.task_pool below
  problem_size: 10              # Fallback/default (overridden by task pool)

# =============================================================================
# Policy Network Architecture
# =============================================================================
network:
  type: hgnn                    # Heterogeneous Graph Neural Network

  backbone:
    embedding_dim: 128          # Hidden embedding dimension
    n_heads: 4                  # Multi-head attention heads
    n_encoder_layers: 3         # Transformer encoder depth

  regularization:
    dropout: 0.1                # Dropout rate
    use_instance_norm: true     # Instance normalization before activation
    ortho_init: true            # Orthogonal weight initialization

  decoder:
    clip_logits: 10.0           # Tanh clipping range for stability

# =============================================================================
# RL Objective (PPO for inner/outer loss)
# =============================================================================
rl_objective:
  gamma: 0.99                   # Discount factor
  gae_lambda: 0.95              # GAE-λ for advantage estimation
  value_coefficient: 0.5        # Weight on value loss
  entropy_coefficient: 0.02     # Entropy bonus (exploration)
  normalize_advantages: true    # Normalize advantages per batch
  normalize_rewards: true       # Normalize rewards per batch

# =============================================================================
# Meta-Learning Algorithm (MAML)
# =============================================================================
algorithm:
  name: maml

  # Outer loop: meta-policy update
  outer_loop:
    meta_learning_rate: 0.0003  # Meta-optimizer learning rate (small)
    n_tasks_per_update: 4       # Tasks sampled per meta-update
    max_gradient_norm: 0.5      # Gradient clipping threshold

  # Inner loop: task-specific fast weights adaptation
  inner_loop:
    adaptation_learning_rate: 0.01  # SGD learning rate for inner loop
    n_adaptation_steps: 1           # Gradient steps per task (1-2 typical)

  # Data collection for inner/outer loop
  data_collection:
    support_rollout_length: 256     # Inner-loop training data
    query_rollout_length: 256       # Outer-loop meta-gradient data

  # Curriculum: gradually add harder tasks as policy improves
  curriculum:
    entropy_threshold: 0.5          # Expand when entropy falls below this
    check_interval: 1               # Check every N meta-updates

  # Task pool definition: problem sizes and budget per size
  task_pool:
    sizes: [10, 20, 50, 100]        # Task difficulty levels (nodes)
    n_instances_per_size: 5         # Training instances per size
    curriculum_expansion:
      enabled: true                 # Enable task pool expansion
      initial_size: [10]            # Start with size 10 only
      # Expands to [10, 20] → [10, 20, 50] → [10, 20, 50, 100]

  # Fine-tuning (optional Phase 2)
  fine_tuning:
    enabled: false                  # Disable post-meta-learning fine-tune
    # If enabled:
    #   steps_per_task: 10
    #   learning_rate: 0.001
    #   total_steps: 100000

# =============================================================================
# Training Loop Configuration
# =============================================================================
learning_rate: 0.001            # Fallback learning rate (overridden by algorithm.outer_loop.meta_learning_rate)

training:
  # Training budget
  total_timesteps: 2_000_000     # Total environment steps

  # Rollout collection (overridden by algorithm.data_collection)
  rollout_length: 256

  # Logging & checkpointing
  logging:
    log_interval: 5              # Log every N iterations
    eval_interval: 20            # Evaluate every N iterations
    checkpoint_interval: 100     # Save checkpoint every N iterations
    checkpoint_dir: experiment/train
    log_dir: experiment/train/logs

  # Early stopping
  early_stopping:
    patience: 150                # Stop after N evals without improvement
    min_delta: 0.0001            # Minimum improvement to reset patience
    metric: mean_objective

# =============================================================================
# Evaluation Configuration
# =============================================================================
evaluation:
  n_episodes: 20                 # Evaluation instances per checkpoint
  deterministic: true            # Greedy (no sampling) during eval

  decoding:
    strategy: greedy             # greedy | beam
    beam_width: 1                # Beam width (1 = greedy)

# =============================================================================
# Usage
# =============================================================================
#
# Train with meta-learning (MAML):
#   python train.py --config configs/train/vrpbtw_meta.yaml
#
# Override specific values:
#   python train.py --config configs/train/vrpbtw_meta.yaml --name my_maml_run
#   python train.py --config configs/train/vrpbtw_meta.yaml --device cuda
#   python train.py --config configs/train/vrpbtw_meta.yaml --override configs/overrides/maml_large_lr.yaml
#
# Outputs: experiment/train/vrpbtw_meta/
#   ├── vrpbtw_meta_config.yaml     (saved config snapshot)
#   ├── vrpbtw_meta_best.pt         (best meta-policy weights)
#   ├── vrpbtw_meta_final.pt        (final meta-policy weights)
#   └── logs/
#       └── vrpbtw_meta.jsonl       (training metrics: loss, entropy, eval scores)
#
# The meta-policy from Phase 1 is used as:
#   - Initial policy for Phase 2 fine-tuning (if enabled)
#   - Zero-shot policy for evaluate.py cross-size evaluation
#   - Starting point for downstream task-specific adaptation
#
# =============================================================================
